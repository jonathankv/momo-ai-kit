name: validate

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'agents/**'
      - 'commands/**'
      - 'scripts/**'
  push:
    branches: [main]

jobs:
  doctor:
    name: Frontmatter + structure check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run doctor.sh
        run: ./scripts/doctor.sh

  catalog:
    name: Regenerate catalog
    runs-on: ubuntu-latest
    needs: doctor
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build catalog
        run: ./scripts/build-catalog.sh

      - name: Commit catalog if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet docs/catalog.md; then
            git add docs/catalog.md
            git commit -m "chore: regenerate catalog"
            git push
          fi
